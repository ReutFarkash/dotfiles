name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pre_setup_admin:
    name: pre_setup_admin / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Syntax check
        run: bash -n pre_setup_admin.sh && echo "✓ syntax ok"

      - name: Linux — exits with macOS-only error
        if: runner.os == 'Linux'
        run: |
          if printf "testuser\nn\nn\nn\n" | bash pre_setup_admin.sh 2>&1; then
            echo "✗ Expected non-zero exit on Linux" && exit 1
          fi
          echo "✓ Correctly rejected on Linux"

      - name: macOS — run with current user (skip CLT/Homebrew installs)
        if: runner.os == 'macOS'
        run: |
          # Inputs: target user=$USER, n×3 (skip any optional installs that prompt),
          # empty line (accept default HTTPS repo URL from git remote).
          # Extra n/empty lines are harmless — unused stdin is silently discarded.
          printf "%s\nn\nn\nn\n\n" "$USER" | bash pre_setup_admin.sh

      - name: macOS — verify /etc/shells contains a bash entry
        if: runner.os == 'macOS'
        run: |
          grep -qE '/bash$' /etc/shells || { echo "✗ No bash entry in /etc/shells"; exit 1; }
          echo "✓ /etc/shells contains a bash entry"

      - name: macOS — verify target user shell is set to bash
        if: runner.os == 'macOS'
        run: |
          shell=$(dscl . -read /Users/"$USER" UserShell | awk '{print $2}')
          echo "UserShell: $shell"
          [[ "$shell" == *bash* ]] || { echo "✗ Shell is not bash: $shell"; exit 1; }
          echo "✓ Default shell is bash"

      - name: macOS — verify dotfiles were cloned with correct ownership
        if: runner.os == 'macOS'
        run: |
          clone_dest="$HOME/dotfiles"
          test -d "$clone_dest" || { echo "✗ $clone_dest not found"; exit 1; }
          echo "✓ $clone_dest exists"
          test -f "$clone_dest/setup.sh" || { echo "✗ setup.sh missing from clone"; exit 1; }
          echo "✓ setup.sh present"
          owner=$(stat -f "%Su" "$clone_dest")
          [ "$owner" = "$USER" ] || { echo "✗ Owner is '$owner', expected '$USER'"; exit 1; }
          echo "✓ Owner is $USER"

      - name: macOS — idempotency (re-run skips existing clone without error)
        if: runner.os == 'macOS'
        run: |
          printf "%s\nn\nn\nn\n\n" "$USER" | bash pre_setup_admin.sh
          echo "✓ Second run completed without error"
          # Clone dest must still exist and not be doubled
          test -d "$HOME/dotfiles" || { echo "✗ Clone disappeared on second run"; exit 1; }
          echo "✓ Clone still present after second run"

  ssh_setup:
    name: ssh_setup / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Pre-create SSH key (bypass interactive ssh-keygen)
        run: ssh-keygen -t ed25519 -N "" -f "$HOME/.ssh/id_ed25519" -C "test@ci"

      - name: Run ssh_setup (key exists path — no agent, yes host alias)
        # Inputs: skip agent → N, add host alias → y, alias name, hostname, user
        run: printf "N\ny\nmyserver\n192.168.1.100\ntestuser\n" | bash ssh_setup.sh

      - name: Verify ~/.ssh/config was created with correct content
        run: |
          test -f "$HOME/.ssh/config" || { echo "✗ ~/.ssh/config missing"; exit 1; }
          echo "✓ ~/.ssh/config exists"
          grep -q "^Host myserver$" "$HOME/.ssh/config" || { echo "✗ Host myserver not in config"; exit 1; }
          echo "✓ Host myserver present"
          grep -q "HostName 192.168.1.100" "$HOME/.ssh/config" || { echo "✗ HostName missing"; exit 1; }
          echo "✓ HostName correct"
          grep -q "User testuser" "$HOME/.ssh/config" || { echo "✗ User missing"; exit 1; }
          echo "✓ User correct"
          grep -q "IdentityFile" "$HOME/.ssh/config" || { echo "✗ IdentityFile missing"; exit 1; }
          echo "✓ IdentityFile present"

      - name: Verify ~/.ssh and config permissions
        run: |
          ssh_perms=$(stat -c "%a" "$HOME/.ssh" 2>/dev/null || stat -f "%OLp" "$HOME/.ssh")
          [ "$ssh_perms" = "700" ] || { echo "✗ ~/.ssh has perms $ssh_perms, want 700"; exit 1; }
          echo "✓ ~/.ssh is 700"
          cfg_perms=$(stat -c "%a" "$HOME/.ssh/config" 2>/dev/null || stat -f "%OLp" "$HOME/.ssh/config")
          [ "$cfg_perms" = "600" ] || { echo "✗ ~/.ssh/config has perms $cfg_perms, want 600"; exit 1; }
          echo "✓ ~/.ssh/config is 600"

      - name: Verify duplicate host alias is not added on re-run
        run: |
          printf "N\ny\nmyserver\n192.168.1.100\ntestuser\n" | bash ssh_setup.sh
          count=$(grep -c "^Host myserver$" "$HOME/.ssh/config")
          [ "$count" -eq 1 ] || { echo "✗ Expected 1 Host myserver block, found $count"; exit 1; }
          echo "✓ No duplicate host alias after re-run"

  setup:
    name: ${{ matrix.profile }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        profile: [minimal, standard, full]
        include:
          - profile: minimal
            choice: '3'
          - profile: standard
            choice: '2'
          - profile: full
            choice: '1'

    steps:
      - uses: actions/checkout@v4

      - name: Run setup (non-interactive)
        # profile choice, username, skip git identity (empty name/email), 'n' for bash shell switch, 'n' for cheat sheet
        run: printf "${{ matrix.choice }}\ntestuser\n\n\nn\n" | bash setup.sh

      - name: Verify symlinks (profile-aware)
        run: |
          source "$HOME/.user_config"

          check_link() {
            if [ -L "$HOME/$1" ]; then
              echo "✓ ~/$1 -> $(readlink $HOME/$1)"
            else
              echo "✗ ~/$1 is missing or not a symlink" && exit 1
            fi
          }

          # Base files — all profiles
          for f in .bashrc .bash_profile .bash_aliases .bash_env_vars .bash_logout .path; do
            check_link "$f"
          done

          # Prompt system — standard and full only
          if [ "$DOTFILES_PROFILE" != "minimal" ]; then
            for f in .bash_prompt prompt_utils.sh git_manager.sh stats_manager.sh theme_manager.sh manager.sh shorten_path.sh; do
              check_link "$f"
            done
          fi

          # Full-only files
          if [ "$DOTFILES_PROFILE" = "full" ]; then
            for f in .bash_command_color_aliases .aw-terminal-hooks.bash hydra_completion.sh; do
              check_link "$f"
            done
            for f in git_scripts/graph_submodules.sh git_scripts/lazygit.sh git_scripts/gitsubmodules_scripts.sh; do
              check_link "$f"
            done
          fi

          # Minimal must NOT have prompt system files (they shouldn't be linked)
          if [ "$DOTFILES_PROFILE" = "minimal" ]; then
            for f in hydra_completion.sh .aw-terminal-hooks.bash .bash_command_color_aliases; do
              if [ -L "$HOME/$f" ]; then
                echo "✗ ~/$f should not be symlinked for minimal profile" && exit 1
              fi
              echo "✓ ~/$f correctly absent for minimal"
            done
          fi

      - name: Verify user_config
        run: |
          test -f "$HOME/.user_config" || (echo "✗ ~/.user_config missing" && exit 1)
          source "$HOME/.user_config"
          echo "DOTFILES_PROFILE=$DOTFILES_PROFILE"
          [ "$DOTFILES_PROFILE" = "${{ matrix.profile }}" ] || \
            (echo "✗ Expected profile '${{ matrix.profile }}', got '$DOTFILES_PROFILE'" && exit 1)
          echo "✓ Profile correct"
          test -n "$DOTFILES_REPO" || (echo "✗ DOTFILES_REPO not set in ~/.user_config" && exit 1)
          test -d "$DOTFILES_REPO"  || (echo "✗ DOTFILES_REPO points to missing path: $DOTFILES_REPO" && exit 1)
          echo "✓ DOTFILES_REPO = $DOTFILES_REPO"

      - name: Syntax check all shell files
        run: |
          find . -name "*.sh" | while read f; do
            bash -n "$f" || (echo "✗ Syntax error in $f" && exit 1)
            echo "✓ $f"
          done
          for f in .bash_aliases .bash_env_vars .bashrc .bash_profile .path; do
            bash -n "$f" || (echo "✗ Syntax error in $f" && exit 1)
            echo "✓ $f"
          done

      - name: Source profile and verify base aliases (all profiles)
        run: |
          shopt -s expand_aliases
          source "$HOME/.user_config"
          source "$HOME/.bash_aliases"
          echo "✓ .bash_aliases sourced"

          check_alias() {
            alias "$1" >/dev/null 2>&1 || { echo "✗ $1 not defined"; exit 1; }
            echo "✓ $1"
          }
          check_alias ll
          check_alias la
          check_alias gs
          check_alias gp
          check_alias reload
          check_alias myip

      - name: Verify useful function (all profiles)
        run: |
          shopt -s expand_aliases
          source "$HOME/.user_config"
          source "$HOME/.bash_aliases"
          declare -f useful >/dev/null 2>&1 || { echo "✗ useful function not defined for ${{ matrix.profile }} profile"; exit 1; }
          echo "✓ useful defined"

      - name: Verify aliases listed in useful() all exist
        run: |
          shopt -s expand_aliases
          source "$HOME/.user_config"
          source "$HOME/.bash_aliases"
          declare -f useful >/dev/null 2>&1 || exit 0
          # Extract indented short-words from useful() output (the command column)
          useful | grep -E '^\s{2,4}[a-z_]+\s' | awk '{print $1}' | while read cmd; do
            alias "$cmd" >/dev/null 2>&1 || declare -f "$cmd" >/dev/null 2>&1 || {
              echo "✗ '$cmd' is listed in useful() but is not defined"
              exit 1
            }
            echo "✓ $cmd"
          done

      - name: Verify standard/full extras
        if: matrix.profile != 'minimal'
        run: |
          shopt -s expand_aliases
          source "$HOME/.user_config"
          source "$HOME/.bash_aliases"

          alias graph >/dev/null 2>&1 || { echo "✗ graph not defined"; exit 1; }
          echo "✓ graph"

          [ "$PRINTGIT" = "true" ] || { echo "✗ PRINTGIT is not true for ${{ matrix.profile }} profile"; exit 1; }
          echo "✓ PRINTGIT=true"

      - name: Verify setup idempotency (run twice)
        run: |
          printf "${{ matrix.choice }}\ntestuser\n\n\nn\n" | bash setup.sh
          echo "✓ Second run completed without error"
          source "$HOME/.user_config"
          [ "$DOTFILES_PROFILE" = "${{ matrix.profile }}" ] || \
            (echo "✗ Profile changed after second run" && exit 1)
          echo "✓ Profile unchanged after second run"
